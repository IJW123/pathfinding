[package]
name = "pathfinding"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "default_app",
    "2d_bevy_render",
    "std",
    "bevy_gilrs",
    "bevy_winit",
    "default_font",
    "multi_threaded",
    "webgl2",
    "x11",
    "sysinfo_plugin",
] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
